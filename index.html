<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Discarding Audit Builder</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>%F0%9F%A7%AC</text></svg>" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main id="app">
      <h1>Discarding Audit Builder</h1>
      <p class="sub">Drop the patient destruction PDFs — everything stays in your browser.</p>

      <label class="date-row">Discarding date
        <input type="date" id="discardDate" />
      </label>

      <label class="date-row">Auditor
        <input type="text" id="auditor" class="auditor" />
      </label>

      <div id="dropzone" class="dropzone">
        <input type="file" id="fileInput" accept="application/pdf" multiple hidden />
        <span>Drop PDFs here, or <button type="button" id="pickBtn">choose files</button></span>
      </div>

      <ul id="fileList" class="file-list"></ul>
      <div id="messages" class="messages"></div>

      <h2>Preview</h2>
      <div id="preview" class="preview"></div>

      <div class="actions">
        <button id="downloadBtn" type="button" disabled>Download Excel</button>
        <button id="reportBtn" type="button" disabled>Download Word report</button>
      </div>

      <div class="sync">
        <label>Sync code
          <input type="text" id="syncCode" class="sync-code" placeholder="a secret you choose" />
        </label>
        <button id="saveCloudBtn" type="button">Save to cloud</button>
        <button id="loadCloudBtn" type="button">Load from cloud</button>
        <span id="syncStatus" class="sync-status"></span>
        <p class="sync-hint">Prepare data now, set compliance on audit day. Use the same code on another device to continue. Data is encrypted with your code before it leaves the browser.</p>
      </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
